<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Insulae Incognita — Combined (Auto + Typing)</title>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans:wght@100..900&display=swap" rel="stylesheet">

  <!-- your existing modules -->
  <script src="glyphData.js"></script>
  <script src="translationModule.js"></script>
  <script src="backgroundManager.js"></script>
  <script src="lineGenerator.js"></script>

  <!-- new modules -->
  <script src="letterMap.js"></script>
  <script src="typerOverlay.js"></script>

  <style>
    :root { --cols: 30; --rows: 30; }
    body {
      margin: 0; padding: 0; overflow: hidden;
      height: 100vh; display: flex; justify-content: center; align-items: center;
      font-family: "IBM Plex Mono", monospace;
      transition: background-color 1s ease;
    }
    #terminal {
      position: relative;
      font-size: 2.5vmin; line-height: 1; letter-spacing: 3px;
      width: 100%; height: 100%; max-width: 720px;
      display: flex; justify-content: center; align-items: center;
      border-radius: 10px; padding: 20px; overflow: hidden;
    }
    #terminal-content {
      position: relative; width: 100%; height: 100%;
      max-width: 95%; max-height: 90%; overflow: hidden;
    }

    /* three layers aligned on a monospaced grid */
    .layer {
      position: absolute; inset: 0;
      white-space: pre; text-align: left;
      pointer-events: none; /* typing is global; overlay handles it */
      line-height: 0.95;
    }
    .layer p { margin: 0; }

    /* the typing overlay is on top and clickable for focus if needed */
    #typing-layer { pointer-events: auto; }

    /* blinking cursor for overlay */
    .cursor { display: inline-block; width: 0.6em; border-bottom: 2px solid currentColor; }
    @keyframes blink { 0%,100% { opacity: .15 } 50% { opacity: 1 } }
    .cursor { animation: blink 1s step-end infinite; }

    /* colors for extra biomes (your core 5 animate via backgroundManager classes) */
    .rock      { color: hsl(0, 0%, 25%); }
    .swamp     { color: hsl(110, 25%, 18%); }
    .flower    { color: hsl(330, 70%, 55%); }
    .desert    { color: hsl(40, 45%, 55%); }
    .ice       { color: hsl(200, 35%, 80%); }
    .lava      { color: hsl(10, 70%, 45%); }
    .plain     { color: hsl(90, 20%, 35%); }
    .steppe    { color: hsl(70, 25%, 45%); }
    .unknown   { color: hsl(0, 0%, 50%); }
  </style>
</head>
<body>
  <div id="terminal">
    <div id="terminal-content">
      <!-- base autogeneration (exactly like your index.html) -->
      <div id="terrain-layer" class="layer"></div>
      <!-- optional effects layer if you want later -->
      <div id="clouds-layer" class="layer"></div>
      <!-- new typing overlay (aligned 1:1 with terrain lines) -->
      <div id="typing-layer" class="layer" tabindex="0" aria-label="type terrain here"></div>
    </div>
  </div>

  <script>
    // grid constants (match generator + overlay)
    const COLS = 30;
    const MAX_LINES = 30;
    const GENERATION_INTERVAL = 1000;

    const terrainLayer = document.getElementById('terrain-layer');
    const typingLayer  = document.getElementById('typing-layer');

    // modules
    const lineGenerator = new LineGenerator(COLS);
    const translator = new TranslationEngine();
    const background = new BackgroundManager();

    // helper: build a <p> line from cell data
    function buildHTMLFromData(data) {
      return data.map(cell => `<span class="${cell.className}">${cell.char}</span>`).join('');
    }

    // ensure typing layer stays aligned: same number of <p> as terrain layer
    function syncTypingLinesToTerrain() {
      const need = terrainLayer.children.length;
      const have = typingLayer.children.length;
      if (have < need) {
        for (let i = 0; i < need - have; i++) {
          const p = document.createElement('p');
          typingLayer.prepend(p);
        }
      } else if (have > need) {
        for (let i = 0; i < have - need; i++) {
          typingLayer.lastElementChild?.remove();
        }
      }
      // let the overlay know about the count
      if (window.overlay) window.overlay.onSync(need);
    }

    // main loop (your original logic, untouched conceptually)
    setInterval(() => {
      // 1) mutate existing terrain lines (translation tectonics)
      for (const lineP of terrainLayer.children) {
        const current = Array.from(lineP.children).map(span => ({ char: span.textContent, className: span.className }));
        const mutated = translator.translateLineData(current);
        if (mutated.length !== current.length) {
          lineP.innerHTML = buildHTMLFromData(mutated);
        }
      }

      // 2) generate one new line
      const newLineData = lineGenerator.generateNewLine();
      const newP = document.createElement('p');
      newP.innerHTML = buildHTMLFromData(newLineData);
      terrainLayer.prepend(newP);

      // 3) keep the screen size
      if (terrainLayer.children.length > MAX_LINES) {
        terrainLayer.lastElementChild.remove();
      }

      // 4) keep typing overlay aligned with terrain
      syncTypingLinesToTerrain();
    }, GENERATION_INTERVAL);

    // bg animation loop
    (function anim(){ background.update(); requestAnimationFrame(anim); })();

    // boot overlay (fixed cursor row stays constant as new lines prepend)
    window.overlay = new TyperOverlay({
      container: typingLayer,
      fixedRowFromTop: 12, // choose where the cursor “lives” visually
      cols: COLS,
      rows: MAX_LINES
    });

    // focus typing layer so keys work immediately (safe fallback: click to focus)
    typingLayer.focus();
  </script>
</body>
</html>
