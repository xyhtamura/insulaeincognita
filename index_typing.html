<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Insulae Incognita — Typewriter Variant</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans:wght@100..900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

  <script src="backgroundManager.js"></script>
  <script src="letterMap.js"></script>
  <script src="typerEngine.js"></script>

  <style>
    body {
      margin: 0; padding: 0; overflow: hidden;
      height: 100vh; display: flex; justify-content: center; align-items: center;
      transition: background-color 1s ease;
      /* add CJK fallback */
      font-family: "IBM Plex Mono", "Noto Sans JP", "Noto Sans", sans-serif;
    }
    #terminal {
      font-size: 2.5vmin; line-height: 1.05;
      text-align: left; white-space: pre-wrap; padding: 20px;
      border-radius: 10px; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      transition: background-color 1s ease; max-width: 780px; overflow: hidden;
    }
    #terminal-content { max-width: 95%; max-height: 90%; overflow: hidden; }
    #terminal-content p { margin: 0; line-height: 1.0; letter-spacing: 0.08em; }

    /* Natural text mode:
       No fixed width. Each glyph can use its natural width.
       Land biomes: give them a background "tile" via padding. */
    .tile { display: inline-block; padding: 0 0.15em; border-radius: 2px; }

    /* cursor */
    .cursor { display: inline-block; width: 0.6em; border-bottom: 2px solid currentColor; }
    @keyframes blink { 0%, 100% { opacity: 0.2 } 50% { opacity: 1 } }
    .cursor { animation: blink 1s step-end infinite; }

    /* --- COLORS ---
       watery biomes = text-only
       land biomes = .tile + background + contrasting text
    */
    /* watery (text color only) */
    .water     { color: hsl(199, 38%, 60%); }
    .coldwater { color: hsl(210, 45%, 70%); }
    .reef      { color: hsl(170, 55%, 45%); }
    .estuary   { color: hsl(195, 35%, 55%); }
    .swamp     { color: hsl(110, 25%, 30%); }
    .ice       { color: hsl(200, 35%, 82%); }

    /* land (Köppen-ish families) */
    .tropical_rainforest.tile { background: hsl(140, 45%, 30%); color: hsl(120, 20%, 92%); }
    .tropical_savanna.tile    { background: hsl(90, 45%, 45%);  color: #111; }
    .steppe.tile              { background: hsl(70, 25%, 46%);  color: #111; }
    .temperate_forest.tile    { background: hsl(115, 35%, 34%); color: hsl(120, 20%, 92%); }
    .boreal_taiga.tile        { background: hsl(115, 25%, 20%); color: hsl(120, 15%, 92%); }
    .tundra.tile              { background: hsl(80, 10%, 70%);  color: #111; }

    /* keep some of your earlier land styles too (if you like them) */
    .sand.tile      { background: hsl(45, 30%, 70%); color: hsl(25, 25%, 20%); }
    .desert.tile    { background: hsl(40, 45%, 60%); color: #111; }
    .mountain.tile  { background: hsl(10, 12%, 35%); color: hsl(94, 25%, 90%); }
    .rock.tile      { background: hsl(0, 0%, 28%);   color: hsl(0, 0%, 95%); }
    .plain.tile     { background: hsl(90, 24%, 40%); color: #111; }
    .forest.tile    { background: hsl(120, 35%, 22%); color: hsl(137, 97%, 88%); }

    .unknown { color: hsl(0, 0%, 60%); }
  </style>
</head>
<body>
  <div id="terminal">
    <div id="terminal-content"></div>
  </div>

  <script>
    const background = new BackgroundManager();
    (function loop(){ background.update(); requestAnimationFrame(loop); })();

    const engine = new TyperEngine({
      container: document.getElementById('terminal-content'),
      cols: 30,
      rows: 30
    });
  </script>
</body>
</html>
